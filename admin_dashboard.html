<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Admin Dashboard</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/admin_dashboard.css">
    <link rel="stylesheet" href="css/responsive.css"> <!-- Add the responsive CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header>
        <div class="header-left">
            <img class="logo" src="assets/images/logo.png" alt="logo">
        </div>
        <div class="header-right">
            <span class="user-info">
                <i class="fas fa-user-shield"></i>
                <span>Admin</span>
            </span>
            <a class="cta" href="index.html"><button>Logout <i class="fas fa-sign-out-alt"></i></button></a>
        </div>
    </header>
    
    <div class="admin-dashboard-container">
        <div class="welcome-banner">
            <h1>Admin Dashboard</h1>
            <p>Welcome to the administration panel</p>
        </div>
        
        <div class="admin-dashboard-row">
            <div class="admin-dashboard-section">
                <div class="section-header">
                    <h3><i class="fas fa-users-cog"></i> User Management</h3>
                </div>
                <a href="admin_users.html" class="button-link">
                    <button class="admin-dashboard-button">
                        <i class="fas fa-user-plus"></i>
                        <span>Add/Delete Users</span>
                    </button>
                </a>
            </div>
            
            <div class="admin-dashboard-section">
                <div class="section-header">
                    <h3><i class="fas fa-database"></i> Data Management</h3>
                </div>
                <a href="admin_uploads.html" class="button-link">
                    <button class="admin-dashboard-button">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>View Uploads</span>
                    </button>
                </a>
            </div>
            
            <div class="admin-dashboard-section">
                <div class="section-header">
                    <h3><i class="fas fa-file-export"></i> Export Options</h3>
                </div>
                <a href="admin_export.html" class="button-link">
                    <button class="admin-dashboard-button">
                        <i class="fas fa-file-export"></i>
                        <span>Export Report</span>
                    </button>
                </a>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="copyright">&copy; 2025 PCDS2030. All rights reserved.</div>
    </footer>
    
    <!-- Include admin_dashboard.js for functionality -->
    <script src="js/admin_dashboard.js"></script>
    <!-- Include mobile.js for responsive behavior -->
    <script src="js/mobile.js"></script>
</body>
</html>
