<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>PCDS2030 Dashboard</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="home-container">
        <div class="login-section">
            <div class="shape1"></div>
            <div class="shape2"></div>
            <div class="shape3"></div>
            <form id="loginForm">
                <h2>Login</h2>
                <p class="login-subtitle">Please enter your credentials to continue</p>
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <span class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit">Login <i class="fas fa-arrow-right"></i></button>
                <div id="errorMessage" class="error-message"></div>
                <div id="notification" class="notification"></div>
                <div id="loadingSpinner" class="loading-spinner"></div>
            </form>
        </div>
        
        <div class="welcome-section">
            <div class="welcome-logo">
                <img src="assets/images/logo.png" alt="PCDS2030 Logo">
            </div>
            <h1>Welcome!</h1>
            <p>Please log in to access your dashboard.</p>
            </div>
            <div class="copyright">&copy; 2025 PCDS2030.</div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
