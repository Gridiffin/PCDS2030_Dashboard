<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Statistics</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/user_dashboard.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css"> <!-- Add responsive CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header>
        <div class="header-left">
            <img class="logo" src="assets/images/logo.png" alt="logo">
        </div>
        <div class="header-right">
            <span class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>User</span>
            </span>
            <a class="cta" href="user_dashboard.html"><button><i class="fas fa-home"></i> Dashboard</button></a>
            <a class="cta" href="index.html"><button>Logout <i class="fas fa-sign-out-alt"></i></button></a>
        </div>
    </header>
    
    <div class="dashboard-container">
        <div class="welcome-banner">
            <h1>Statistics</h1>
            <p>Submit statistical data for your indicators</p>
        </div>
        
        <div class="dashboard-section">
            <div class="section-header">
                <h3><i class="fas fa-chart-bar"></i> Submit Statistical Data</h3>
            </div>
            <form class="data-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="statYear">Year</label>
                        <select id="statYear" required>
                            <option value="">Select Year</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="statQuarter">Quarter</label>
                        <select id="statQuarter" required>
                            <option value="">Select Quarter</option>
                            <option value="Q1">Q1 (Jan-Mar)</option>
                            <option value="Q2">Q2 (Apr-Jun)</option>
                            <option value="Q3">Q3 (Jul-Sep)</option>
                            <option value="Q4">Q4 (Oct-Dec)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="statCategory">Category</label>
                        <select id="statCategory" required>
                            <option value="">Select Category</option>
                            <option value="economic">Economic</option>
                            <option value="environmental">Environmental</option>
                            <option value="social">Social</option>
                            <option value="governance">Governance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="statIndicator">Indicator</label>
                        <select id="statIndicator" required>
                            <option value="">Select Indicator</option>
                            <option value="ind1">Carbon Emissions</option>
                            <option value="ind2">Water Usage</option>
                            <option value="ind3">Renewable Energy</option>
                            <option value="ind4">Waste Reduction</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Data Points</label>
                    <div class="data-points-container">
                        <div class="data-point">
                            <input type="text" placeholder="Metric name" required>
                            <input type="number" placeholder="Value" required>
                            <select required>
                                <option value="">Unit</option>
                                <option value="kg">kg</option>
                                <option value="ton">ton</option>
                                <option value="liter">liter</option>
                                <option value="kWh">kWh</option>
                                <option value="%">%</option>
                            </select>
                            <button type="button" class="icon-button remove-btn"><i class="fas fa-minus-circle"></i></button>
                        </div>
                    </div>
                    <button type="button" class="add-data-point"><i class="fas fa-plus-circle"></i> Add Data Point</button>
                </div>
                
                <div class="form-group">
                    <label for="chartUpload">Upload Charts</label>
                    <div class="file-upload">
                        <input type="file" id="chartUpload" accept=".png,.jpg,.jpeg,.gif,.pdf" multiple>
                        <label for="chartUpload"><i class="fas fa-chart-pie"></i> Choose Charts</label>
                        <span class="file-info">No files selected</span>
                    </div>
                    <div class="file-requirements">Accepted formats: PNG, JPG, GIF, PDF (Max 10MB each)</div>
                </div>
                
                <div class="form-group">
                    <label for="rawDataUpload">Upload Raw Data (Optional)</label>
                    <div class="file-upload">
                        <input type="file" id="rawDataUpload" accept=".xlsx,.csv,.json">
                        <label for="rawDataUpload"><i class="fas fa-file-excel"></i> Choose File</label>
                        <span class="file-info">No file selected</span>
                    </div>
                    <div class="file-requirements">Accepted formats: Excel, CSV, JSON (Max 20MB)</div>
                </div>
                
                <div class="form-group">
                    <label for="dataNotes">Additional Notes</label>
                    <textarea id="dataNotes" rows="3" placeholder="Add any additional notes or context for the data"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="reset" class="secondary-button"><i class="fas fa-times"></i> Clear Form</button>
                    <button type="submit" class="primary-button"><i class="fas fa-save"></i> Submit Statistics</button>
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <div class="copyright">&copy; 2025 PCDS2030. All rights reserved.</div>
    </footer>
    
    <!-- Include mobile.js for responsive behavior -->
    <script src="js/mobile.js"></script>
</body>
</html>
